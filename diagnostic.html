<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chẩn đoán Hình ảnh Đáy mắt - HiHorus AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: var(--color-bg-secondary); }
        .diag-wrap { max-width: 1280px; margin: 110px auto 60px; padding: 0 24px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--color-accent-navy); font-weight: 600; margin-bottom: 24px; transition: var(--transition-smooth); }
        .back-link:hover { transform: translateX(-5px); }
        .diag-card { background: #fff; border-radius: 24px; box-shadow: var(--shadow-soft); overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .tabs-header { display: flex; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; font-family: inherit; font-size: 1rem; font-weight: 600; color: var(--color-text-muted); cursor: pointer; transition: all 0.3s; position: relative; }
        .tab-btn.active { color: var(--color-accent-navy); background: #fff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--color-accent-navy); }
        .diag-layout { display: flex; gap: 0; min-height: 650px; }
        .diag-layout.initial-state { display: block; }
        .diag-layout.initial-state .image-panel { display: none; }
        .diag-layout.initial-state .results-panel { max-width: 560px; margin: 0 auto; padding: 60px 28px; }
        .image-panel { width: 45%; min-width: 380px; position: relative; background: #0a0a0a; display: flex; align-items: center; justify-content: center; border-radius: 0 0 0 24px; overflow: hidden; }
        .results-panel { flex: 1; padding: 28px; overflow-y: auto; max-height: 750px; }
        @media (max-width: 900px) { .diag-layout { flex-direction: column; } .image-panel { width: 100%; min-width: auto; min-height: 300px; border-radius: 0; } .results-panel { max-height: none; } }
        .upload-area { border: 2px dashed #cbd5e0; border-radius: 16px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: var(--color-accent-light); background: rgba(61,118,242,0.02); }
        .upload-area svg { width: 48px; height: 48px; color: var(--color-accent-light); margin-bottom: 12px; }
        .grade-box { padding: 20px; background: #f0f4ff; border-radius: 14px; border-left: 5px solid var(--color-accent-navy); margin-bottom: 18px; }
        .grade-box.severity-0 { border-left-color: #48BB78; background: #f0fff4; }
        .grade-box.severity-1 { border-left-color: #ECC94B; background: #fefcf0; }
        .grade-box.severity-2 { border-left-color: #ED8936; background: #fff8f0; }
        .grade-box.severity-3 { border-left-color: #E53E3E; background: #fff5f5; }
        .grade-box.severity-4 { border-left-color: #9B2C2C; background: #fff0f0; }
        .grade-number { font-size: 2.4rem; font-weight: 800; margin-bottom: 4px; }
        .grade-label { font-size: 1.05rem; font-weight: 700; color: var(--color-accent-navy); }
        .grade-conf { font-size: 0.9rem; color: var(--color-text-muted); margin-top: 6px; }
        .grade-conf strong { color: #2D3748; font-size: 1rem; }
        .recommendation { margin-top: 12px; padding: 14px 16px; background: rgba(255,255,255,0.8); border-radius: 10px; font-size: 0.9rem; line-height: 1.6; color: #4A5568; border: 1px solid rgba(0,0,0,0.06); }
        .recommendation strong { color: var(--color-accent-navy); font-size: 0.92rem; }
        .gradcam-section { margin-top: 14px; margin-bottom: 14px; }
        .gradcam-toggle { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #edf2f7; background: #f8fafc; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s; }
        .gradcam-toggle.active { background: #fef3c7; border-color: #f6ad55; color: #c05621; }
        .gradcam-toggle:hover { border-color: #cbd5e0; }
        .lesion-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid #edf2f7; }
        .lesion-section h4 { font-size: 0.88rem; color: var(--color-text-muted); margin-bottom: 10px; font-weight: 600; }
        .lesion-control { padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #edf2f7; margin-bottom: 8px; transition: all 0.3s; }
        .lesion-control.active { border-color: currentColor; background: #fff; }
        .lesion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .lesion-label { font-weight: 600; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
        .color-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
        .toggle-btn { padding: 4px 12px; border-radius: 99px; border: none; font-family: inherit; font-size: 0.72rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
        .toggle-btn.on { color: #fff; }
        .toggle-btn.off { background: #e2e8f0; color: #718096; }
        .conf-row { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--color-text-muted); }
        .conf-row input[type=range] { flex: 1; accent-color: var(--color-accent-navy); }
        .spinner { width: 36px; height: 36px; border: 3px solid #edf2f7; border-top-color: var(--color-accent-navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .canvas-wrap { position: relative; display: inline-block; }
        .canvas-wrap canvas { position: absolute; top: 0; left: 0; }
        .server-status { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; margin-bottom: 16px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.online { background: #48BB78; }
        .status-dot.offline { background: #FC8181; }
        .hidden { display: none; }
        .reset-btn { position: absolute; top: 12px; right: 12px; padding: 6px 14px; background: rgba(255,255,255,0.9); border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; z-index: 10; display: flex; align-items: center; gap: 4px; }
        .zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 6px; z-index: 10; }
        .zoom-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); color: #fff; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="hihorus-logo-square.png" alt="Hihorus AI Logo" id="logo-img">
                <span class="logo-text">Hihorus AI</span>
            </a>
            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="index.html#products">Sản phẩm</a></li>
                    <li><a href="index.html#projects">Dự án</a></li>
                    <li><a href="index.html#features">Tính năng</a></li>
                    <li><a href="index.html#contact">Liên hệ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="diag-wrap">
        <a href="index.html#products" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
            Quay lại Sản phẩm
        </a>
        <div class="server-status">
            <span class="status-dot offline" id="status-dot"></span>
            <span id="status-text">Đang kết nối server...</span>
        </div>

        <div class="diag-card">
            <div class="tabs-header">
                <button class="tab-btn active" id="tab-pm" onclick="switchTab('pm')">Cận thị bệnh lý (PM)</button>
                <button class="tab-btn" id="tab-dr" onclick="switchTab('dr')">Võng mạc ĐTĐ (DR)</button>
            </div>
            <div class="diag-layout initial-state" id="diag-layout">
                <!-- Left: Image -->
                <div class="image-panel" id="image-panel">
                    <div id="empty-state" style="text-align:center;color:#666;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        <p style="margin-top:12px;font-size:0.9rem;">Ảnh sẽ hiển thị ở đây</p>
                    </div>
                    <div class="canvas-wrap hidden" id="canvas-wrap">
                        <img id="fundus-img" style="display:block; max-width:100%; max-height:600px;">
                        <canvas id="overlay-canvas"></canvas>
                    </div>
                    <button class="reset-btn hidden" id="reset-btn" onclick="resetAll()">↻ Reset</button>
                    <div class="zoom-controls hidden" id="zoom-controls">
                        <button class="zoom-btn" onclick="zoom(1.2)">+</button>
                        <button class="zoom-btn" onclick="zoom(0.8)">−</button>
                        <button class="zoom-btn" onclick="zoom(0)">↻</button>
                    </div>
                </div>
                <!-- Right: Upload + Results -->
                <div class="results-panel" id="results-panel">
                    <div id="upload-section">
                        <h3 style="margin-bottom:14px; font-size:1.05rem;">Tải ảnh đáy mắt</h3>
                        <div class="upload-area" id="drop-zone">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path></svg>
                            <p style="font-weight:600;font-size:0.9rem;">Kéo thả hoặc click để chọn ảnh</p>
                            <p style="font-size:0.8rem;color:var(--color-text-muted);margin-top:6px;">JPG, PNG</p>
                        </div>
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                    </div>
                    <div id="loading-section" class="hidden" style="text-align:center; padding:40px 0;">
                        <div class="spinner"></div>
                        <p style="font-weight:600;">Đang phân tích...</p>
                        <p style="font-size:0.82rem;color:var(--color-text-muted);margin-top:4px;">Có thể mất 10-30 giây</p>
                    </div>
                    <div id="results-section" class="hidden">
                        <div id="grade-display"></div>
                        <div id="gradcam-section" class="gradcam-section hidden">
                            <button class="gradcam-toggle" id="gradcam-btn" onclick="toggleGradcam()">🔥 Grad-CAM (Vùng AI tập trung)</button>
                        </div>
                        <div class="lesion-section">
                            <h4>Các tổn thương phát hiện</h4>
                            <div id="lesion-controls"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API = "http://localhost:5000";
    let currentTab = "pm";
    let currentData = null;
    let lesionStates = {};
    let pmMaskImages = {};
    let gradcamImage = null;
    let gradcamVisible = false;
    let currentZoom = 1;

    // DR lesion colors
    const COLORS = {
        0: { color: "#D69E2E", name: "Vi phình mạch" },    // Yellow
        1: { color: "#E53E3E", name: "Xuất huyết" },       // Red
        2: { color: "#2B6CB0", name: "Xuất tiết cứng" },   // Blue
        3: { color: "#38A169", name: "Xuất tiết mềm" },    // Green
        4: { color: "#00CED1", name: "Gai thị" }           // Cyan
    };

    // PM segmentation colors
    const PM_COLORS = {
        cnv: { color: "#E040FB", name: "CNV" },           // Magenta/Purple
        fs:  { color: "#FF6D00", name: "Fuchs spot" },     // Orange
        lc:  { color: "#00BCD4", name: "Lacquer crack" }   // Cyan/Teal
    };

    // Server health check
    async function checkServer() {
        try {
            const r = await fetch(API + "/api/health");
            if (r.ok) {
                document.getElementById("status-dot").className = "status-dot online";
                document.getElementById("status-text").textContent = "Server đang hoạt động";
            }
        } catch {
            document.getElementById("status-dot").className = "status-dot offline";
            document.getElementById("status-text").textContent = "Server offline — Chạy: python server.py";
        }
    }
    checkServer();

    function switchTab(type) {
        currentTab = type;
        document.getElementById("tab-pm").classList.toggle("active", type === "pm");
        document.getElementById("tab-dr").classList.toggle("active", type === "dr");
        resetAll();
    }

    function resetAll() {
        currentData = null;
        lesionStates = {};
        pmMaskImages = {};
        gradcamImage = null;
        gradcamVisible = false;
        currentZoom = 1;
        document.getElementById("diag-layout").classList.add("initial-state");
        document.getElementById("upload-section").classList.remove("hidden");
        document.getElementById("loading-section").classList.add("hidden");
        document.getElementById("results-section").classList.add("hidden");
        document.getElementById("canvas-wrap").classList.add("hidden");
        document.getElementById("empty-state").classList.remove("hidden");
        document.getElementById("reset-btn").classList.add("hidden");
        document.getElementById("zoom-controls").classList.add("hidden");
        document.getElementById("gradcam-section").classList.add("hidden");
        document.getElementById("file-input").value = "";
    }

    // File handling
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--color-accent-navy)"; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = ""; };
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.style.borderColor = ""; if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => { if (e.target.files.length) handleFile(e.target.files[0]); };

    async function handleFile(file) {
        document.getElementById("upload-section").classList.add("hidden");
        document.getElementById("loading-section").classList.remove("hidden");

        const formData = new FormData();
        formData.append("image", file);
        const endpoint = currentTab === "dr" ? "/api/predict/dr" : "/api/predict/pm";

        try {
            const res = await fetch(API + endpoint, { method: "POST", body: formData });
            const data = await res.json();
            document.getElementById("loading-section").classList.add("hidden");

            if (data.error) {
                alert("Lỗi: " + data.error);
                document.getElementById("upload-section").classList.remove("hidden");
                return;
            }
            currentData = data;
            showImage(data.original_image);

            if (data.type === "pm" && data.segmentation_results) {
                await loadPmMasks(data.segmentation_results);
            }

            // Load Grad-CAM image
            if (data.gradcam) {
                await new Promise(resolve => {
                    gradcamImage = new Image();
                    gradcamImage.onload = resolve;
                    gradcamImage.onerror = resolve;
                    gradcamImage.src = "data:image/png;base64," + data.gradcam;
                });
            }

            showResults(data);
        } catch (err) {
            document.getElementById("loading-section").classList.add("hidden");
            document.getElementById("upload-section").classList.remove("hidden");
            alert("Không kết nối được server. Hãy chạy: python server.py");
        }
    }

    function loadPmMasks(segResults) {
        // Load mask images into HTMLImageElements for canvas drawing
        const promises = segResults.filter(s => s.available && s.mask).map(s => {
            return new Promise((resolve) => {
                const maskImg = new Image();
                maskImg.onload = () => { pmMaskImages[s.key] = maskImg; resolve(); };
                maskImg.onerror = () => resolve();
                maskImg.src = "data:image/png;base64," + s.mask;
            });
        });
        return Promise.all(promises);
    }

    function showImage(b64) {
        // Switch from initial centered layout to two-column layout
        document.getElementById("diag-layout").classList.remove("initial-state");
        const img = document.getElementById("fundus-img");
        img.onload = () => {
            const canvas = document.getElementById("overlay-canvas");
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.style.width = img.width + "px";
            canvas.style.height = img.height + "px";
            drawOverlay();
        };
        img.src = "data:image/png;base64," + b64;
        document.getElementById("canvas-wrap").classList.remove("hidden");
        document.getElementById("empty-state").classList.add("hidden");
        document.getElementById("reset-btn").classList.remove("hidden");
        document.getElementById("zoom-controls").classList.remove("hidden");
    }

    function showResults(data) {
        document.getElementById("results-section").classList.remove("hidden");

        // Grading with grade number, confidence, recommendation
        const g = data.grading;
        const sevColors = ['#48BB78','#ECC94B','#ED8936','#E53E3E','#9B2C2C'];
        const gradeColor = sevColors[g.grade] || '#888';
        let gradeHtml = `<div class="grade-box severity-${g.grade}">
            <p style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:4px;">Phân độ bệnh</p>
            <p class="grade-number" style="color:${gradeColor}">Độ ${g.grade}</p>
            <p class="grade-label">${g.label}</p>
            <p class="grade-conf">Độ tự tin: <strong>${g.confidence}%</strong></p>
            ${g.recommendation ? `<div class="recommendation"><strong>⚕ Khuyến nghị:</strong> ${g.recommendation}</div>` : ''}
        </div>`;
        document.getElementById("grade-display").innerHTML = gradeHtml;

        // Grad-CAM toggle
        if (data.gradcam && gradcamImage) {
            document.getElementById("gradcam-section").classList.remove("hidden");
            const btn = document.getElementById("gradcam-btn");
            btn.classList.remove("active");
            gradcamVisible = false;
        } else {
            document.getElementById("gradcam-section").classList.add("hidden");
        }

        const controlsEl = document.getElementById("lesion-controls");

        if (data.type === "dr" && data.lesion_groups) {
            // === DR: Bounding box controls ===
            let html = "";
            data.lesion_groups.forEach(g => {
                const c = COLORS[g.class_id] || { color: "#888", name: g.label };
                lesionStates[g.class_id] = { visible: true, minConf: 40 };
                const visCount = g.boxes.filter(b => b.confidence >= 40).length;
                html += `
                <div class="lesion-control active" id="lc-${g.class_id}" style="border-color:${c.color}20;">
                    <div class="lesion-header">
                        <span class="lesion-label"><span class="color-dot" style="background:${c.color}"></span>${g.label} (${visCount}/${g.total})</span>
                        <button class="toggle-btn on" id="tog-${g.class_id}" style="background:${c.color}" onclick="toggleLesion(${g.class_id})">Highlight ✓</button>
                    </div>
                    <div class="conf-row">
                        <span>Confidence ≥ ${lesionStates[g.class_id].minConf}%</span>
                        <input type="range" min="0" max="100" value="40" oninput="changeConf(${g.class_id}, this.value)">
                        <span id="conf-val-${g.class_id}">40%</span>
                    </div>
                </div>`;
            });
            controlsEl.innerHTML = html;

        } else if (data.type === "pm" && data.segmentation_results) {
            // === PM: Segmentation mask controls ===
            let html = "";
            data.segmentation_results.forEach(s => {
                const c = PM_COLORS[s.key] || { color: "#888", name: s.label };
                const detected = s.available && s.pixel_count > 0;
                lesionStates[s.key] = { visible: detected, opacity: 50 };

                const statusText = !s.available ? "Model N/A" : (s.pixel_count > 0 ? `${s.pixel_count.toLocaleString()} px` : "Không phát hiện");
                const activeClass = detected ? "active" : "";
                const btnClass = detected ? "on" : "off";
                const btnStyle = detected ? `background:${c.color}` : "";
                const btnLabel = detected ? "Highlight ✓" : "Highlight";

                html += `
                <div class="lesion-control ${activeClass}" id="lc-${s.key}" style="border-color:${c.color}20;">
                    <div class="lesion-header">
                        <span class="lesion-label"><span class="color-dot" style="background:${c.color}"></span>${s.label}</span>
                        <button class="toggle-btn ${btnClass}" id="tog-${s.key}" style="${btnStyle}" onclick="togglePmLesion('${s.key}')" ${!detected ? 'disabled' : ''}>${btnLabel}</button>
                    </div>
                    <div class="conf-row">
                        <span>${statusText}</span>
                        ${detected ? `<input type="range" min="10" max="100" value="50" oninput="changePmOpacity('${s.key}', this.value)"><span id="opacity-val-${s.key}">50%</span>` : ''}
                    </div>
                </div>`;
            });
            controlsEl.innerHTML = html;
            drawOverlay();
        }
    }

    // === DR toggle/conf functions ===
    function toggleLesion(classId) {
        const state = lesionStates[classId];
        state.visible = !state.visible;
        const btn = document.getElementById("tog-" + classId);
        const card = document.getElementById("lc-" + classId);
        const c = COLORS[classId] || { color: "#888" };
        if (state.visible) {
            btn.className = "toggle-btn on";
            btn.style.background = c.color;
            btn.innerHTML = "Highlight ✓";
            card.classList.add("active");
        } else {
            btn.className = "toggle-btn off";
            btn.style.background = "";
            btn.innerHTML = "Highlight";
            card.classList.remove("active");
        }
        drawOverlay();
    }

    function changeConf(classId, val) {
        lesionStates[classId].minConf = parseInt(val);
        document.getElementById("conf-val-" + classId).textContent = val + "%";
        if (currentData && currentData.lesion_groups) {
            const g = currentData.lesion_groups.find(x => x.class_id === classId);
            if (g) {
                const visCount = g.boxes.filter(b => b.confidence >= parseInt(val)).length;
                const labelEl = document.querySelector(`#lc-${classId} .lesion-label`);
                const c = COLORS[classId] || { color: "#888" };
                labelEl.innerHTML = `<span class="color-dot" style="background:${c.color}"></span>${g.label} (${visCount}/${g.total})`;
            }
        }
        drawOverlay();
    }

    // === PM toggle/opacity functions ===
    function togglePmLesion(key) {
        const state = lesionStates[key];
        state.visible = !state.visible;
        const btn = document.getElementById("tog-" + key);
        const card = document.getElementById("lc-" + key);
        const c = PM_COLORS[key] || { color: "#888" };
        if (state.visible) {
            btn.className = "toggle-btn on";
            btn.style.background = c.color;
            btn.innerHTML = "Highlight ✓";
            card.classList.add("active");
        } else {
            btn.className = "toggle-btn off";
            btn.style.background = "";
            btn.innerHTML = "Highlight";
            card.classList.remove("active");
        }
        drawOverlay();
    }

    function changePmOpacity(key, val) {
        lesionStates[key].opacity = parseInt(val);
        document.getElementById("opacity-val-" + key).textContent = val + "%";
        drawOverlay();
    }

    function toggleGradcam() {
        gradcamVisible = !gradcamVisible;
        const btn = document.getElementById("gradcam-btn");
        btn.classList.toggle("active", gradcamVisible);
        btn.textContent = gradcamVisible ? '🔥 Grad-CAM — Đang hiển thị ✓' : '🔥 Grad-CAM (Vùng AI tập trung)';
        
        // When gradcam is on, show it as the main image; when off, show original
        const img = document.getElementById("fundus-img");
        if (gradcamVisible && gradcamImage) {
            img.src = gradcamImage.src;
        } else if (currentData) {
            img.src = "data:image/png;base64," + currentData.original_image;
        }
    }

    // === Unified draw overlay ===
    function drawOverlay() {
        const canvas = document.getElementById("overlay-canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!currentData) return;

        if (currentData.type === "dr" && currentData.lesion_groups) {
            // DR: draw bounding boxes
            const scaleX = canvas.width / currentData.image_width;
            const scaleY = canvas.height / currentData.image_height;

            currentData.lesion_groups.forEach(g => {
                const state = lesionStates[g.class_id];
                if (!state || !state.visible) return;
                const c = COLORS[g.class_id] || { color: "#888" };

                g.boxes.forEach(box => {
                    if (box.confidence < state.minConf) return;
                    const [x1, y1, x2, y2] = box.bbox;
                    const sx = x1 * scaleX, sy = y1 * scaleY;
                    const sw = (x2 - x1) * scaleX, sh = (y2 - y1) * scaleY;

                    ctx.strokeStyle = c.color;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sx, sy, sw, sh);
                    ctx.fillStyle = c.color + "15";
                    ctx.fillRect(sx, sy, sw, sh);
                });
            });

        } else if (currentData.type === "pm" && currentData.segmentation_results) {
            // PM: draw colored segmentation masks
            currentData.segmentation_results.forEach(s => {
                const state = lesionStates[s.key];
                if (!state || !state.visible) return;
                const maskImg = pmMaskImages[s.key];
                if (!maskImg) return;

                const c = PM_COLORS[s.key] || { color: "#888" };
                const opacity = (state.opacity || 50) / 100;

                // Draw the white mask onto a temp canvas, then colorize it
                const tmpCanvas = document.createElement("canvas");
                tmpCanvas.width = canvas.width;
                tmpCanvas.height = canvas.height;
                const tmpCtx = tmpCanvas.getContext("2d");

                // Draw mask scaled to canvas size
                tmpCtx.drawImage(maskImg, 0, 0, canvas.width, canvas.height);

                // Get mask pixel data and colorize
                const imageData = tmpCtx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const rgb = hexToRgb(c.color);

                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] > 0) { // non-transparent pixel = lesion
                        data[i] = rgb.r;
                        data[i + 1] = rgb.g;
                        data[i + 2] = rgb.b;
                        data[i + 3] = Math.round(255 * opacity);
                    }
                }
                tmpCtx.putImageData(imageData, 0, 0);

                // Composite onto main canvas
                ctx.drawImage(tmpCanvas, 0, 0);
            });
        }
    }

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 136, g: 136, b: 136 };
    }

    function zoom(factor) {
        const wrap = document.getElementById("canvas-wrap");
        if (factor === 0) { currentZoom = 1; } else { currentZoom *= factor; }
        currentZoom = Math.max(0.5, Math.min(3, currentZoom));
        wrap.style.transform = `scale(${currentZoom})`;
        wrap.style.transformOrigin = "center center";
    }
    </script>
</body>
